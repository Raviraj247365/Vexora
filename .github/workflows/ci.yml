name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docs-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install markdownlint
        run: |
          npm install -g markdownlint-cli

      - name: Lint docs
        run: |
          markdownlint "docs/**/*.md" "*.md" || true

      - name: Basic docs presence checks
        run: |
          test -f README.md
          test -f docs/TOC.md
          test -f docs/project_brain.md

  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend deps (no-op if none)
        working-directory: apps/backend
        run: |
          if [ -f package.json ]; then npm ci; else echo "no package.json"; fi
