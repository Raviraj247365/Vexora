name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docs-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install markdownlint
        run: |
          npm install -g markdownlint-cli

      - name: Lint docs
        run: |
          markdownlint "docs/**/*.md" "*.md" || true

      - name: Basic docs presence checks
        run: |
          test -f README.md
          test -f docs/TOC.md
          test -f docs/project_brain.md

  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend deps (no-op if none)
        working-directory: apps/backend
        run: |
          if [ -f package.json ]; then npm ci; else echo "no package.json"; fi

  node-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run backend lint if configured
        working-directory: apps/backend
        run: |
          if [ -f package.json ]; then
            if grep -q '"lint"' package.json; then
              npm run lint || true
            else
              echo "No lint script found in apps/backend/package.json"
            fi
          else
            echo "No package.json in apps/backend"
          fi

  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black flake8
      - name: Run Python linters on services/ai
        working-directory: services/ai
        run: |
          if [ -f pyproject.toml ] || [ -d src ]; then
            black --check . || exit 1
            flake8 . || exit 1
          else
            echo "No Python project detected in services/ai"
          fi

  flutter-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Run `flutter analyze` if Flutter app exists
        working-directory: apps/mobile
        run: |
          if [ -f pubspec.yaml ]; then
            flutter pub get
            flutter analyze || true
          else
            echo "No Flutter project found in apps/mobile"
          fi
