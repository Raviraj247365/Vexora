version: '3.8'
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vexora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-vexora_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  firebase-emulator:
    image: warrensbox/firebase-tools:latest
    working_dir: /workspace
    volumes:
      - .:/workspace:cached
      - ./infra/firebase:/workspace/infra/firebase:cached
    environment:
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-vexora-local}
    command: ["sh", "-c", "firebase emulators:start --only auth,storage --project ${FIREBASE_PROJECT_ID}"]
    ports:
      - "9099:9099" # auth emulator
      - "9199:9199" # storage emulator

  backend:
    build:
      context: ./apps/backend
    ports:
      - "3000:3000"
    env_file:
      - apps/backend/.env
    depends_on:
      - postgres
      - firebase-emulator

  ai-service:
    build:
      context: ./services/ai
    ports:
      - "8001:8001"
    env_file:
      - services/ai/.env
    depends_on:
      - firebase-emulator

volumes:
  postgres-data:
